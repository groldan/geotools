name: Linux GitHub CI

on:
  push:
    branches:
      - java_17

env:
  MAVEN_OPTS: -Dmaven.wagon.httpconnectionManager.ttlSeconds=25 -Dmaven.wagon.http.retryHandler.count=3

jobs:
  openjdk17:
    runs-on: [ubuntu-18.04]
    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 17
      uses: actions/setup-java@v1
      with:
        java-version: 17-ea
    - name: Maven repository caching
      uses: actions/cache@v2
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    - uses: actions/setup-python@v1
    - uses: BSFishy/pip-action@v1
      with:
        packages: |
          sphinx
          requests
    #- name: Update maven dependencies
    #  run: |
    #    java -version
    #    mvn -V -Dall de.qaware.maven:go-offline-maven-plugin:resolve-dependencies --no-transfer-progress
    #- name: QA
    #  run: |
    #    mvn -B -fae clean install -Dall -Dfmt.action=check -Dqa=true -DskipTests=true
    - name: Build
      run: |
        mvn -V -B -ntp clean install -Dfmt.skip=true -Dall -T1C
    - name: Remove SNAPSHOT jars from repository
      run: |
        find ~/.m2/repository -name "*SNAPSHOT*" -type d | xargs rm -rf {} 
